# Swashbuckler — local Supabase configuration for e2e tests
# Usage: cd apps/web && supabase start

[api]
enabled = true
port = 54321
schemas = ["public"]

[db]
port = 54322
major_version = 15

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[studio]
enabled = false

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]

[auth.email]
enable_signup = true
double_confirm_changes = false
enable_confirmations = false

[auth.external.google]
enabled = false

[auth.external.github]
enabled = false

[realtime]
enabled = true

[storage]
enabled = true
file_size_limit = "5MB"

[analytics]
enabled = false
